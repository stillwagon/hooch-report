function scoreDay(d) {
  let s = 5; const fm = d.feelsMax;
  if (fm >= 45 && fm <= 62) s += 2; else if (fm >= 38 && fm <= 70) s += 1; else if (fm < 25) s -= 4; else if (fm < 32) s -= 3; else if (fm < 38) s -= 1.5;
  if (d.wind <= 7) s += 2; else if (d.wind <= 10) s += 1; else if (d.wind > 15 && d.wind <= 20) s -= 3; else if (d.wind > 20) s -= 5;
  if (d.cloud >= 60 && d.cloud <= 90 && d.precip < 0.2) s += 1.5;
  if (d.precip > 1) s -= 4; else if (d.precip > 0.5) s -= 3; else if (d.precip > 0.25) s -= 1.5;
  if (d.wx >= 95) s -= 4; else if (d.wx >= 71 && d.wx <= 77) s -= 3; else if (d.wx >= 66 && d.wx <= 67) s -= 3;
  if (d.p24 > 1.5) s -= 3; else if (d.p24 > 0.75) s -= 2; else if (d.p24 > 0.3) s -= 1;
  if (d.p48 > 2.5) s -= 2; else if (d.p48 > 1.5) s -= 1;
  if (fm < 35 && d.wind > 15) s -= 2; if (fm < 32 && d.precip > 0.1) s -= 2;
  if (d.wx >= 66 && d.wx <= 77 && d.wind > 12) s -= 2;
  return Math.max(0, Math.min(10, s));
}
function condKey(d) { if (d.p24 > 0.3 || d.precip > 0.2) return "stained"; if (d.feelsMax < 38) return "cold"; if (d.cloud >= 60) return "overcast"; return "sunny"; }
function clarity(p24, p48) { if (p48 < 0.05 && p24 < 0.05) return { t:"Clear", c:T.ok }; if (p24 > 1) return { t:"Blown", c:T.danger }; if (p24 > 0.5) return { t:"Muddy", c:T.danger }; if (p24 > 0.2) return { t:"Stained", c:T.sienna }; if (p48 > 1) return { t:"Stained", c:T.sienna }; if (p48 > 0.3) return { t:"Clearing", c:T.warn }; return { t:"Clear", c:T.ok }; }
function cfsStatus(cfs, wade) { if (cfs === null) return { t:"-", c:"#555", s:0 }; if (cfs <= wade * 0.65) return { t:"Ideal", c:T.ok, s:10 }; if (cfs <= wade * 0.85) return { t:"Good", c:T.sage, s:7 }; if (cfs <= wade) return { t:"Fishable", c:T.warn, s:4 }; if (cfs <= wade * 1.3) return { t:"Caution", c:T.sienna, s:1 }; return { t:"Blown", c:T.danger, s:0 }; }

function rankSpots(gaugeData, day, stocked, stockInfo, schedule) {
  const mo = day.date.getMonth() + 1, isDH = mo >= 11 || mo <= 5, isW = day.date.getDay() === 0 || day.date.getDay() === 6;
  const ck = condKey(day);
  const now = new Date();
  const isToday = day.isToday;
  // Find active/upcoming generation windows for today
  const activeGen = isToday ? schedule.filter(s => now >= s.start && now <= s.end) : [];
  const upcomingGen = isToday ? schedule.filter(s => s.start > now && (s.start - now) < 6 * 3600000).sort((a, b) => a.start - b.start) : [];
  const recentGen = isToday ? schedule.filter(s => s.end < now && (now - s.end) < 4 * 3600000).sort((a, b) => b.end - a.end) : [];

  return SPOTS.map(sp => {
    const gd = gaugeData[sp.g]?.discharge; const cfs = gd?.length ? parseFloat(gd[gd.length - 1].value) : null;
    const st = cfsStatus(cfs, sp.wade); let score = st.s + sp.q * 0.3;
    const cl = clarity(day.p24 * (sp.sec === "mid" ? 1.3 : sp.sec === "lower" ? 1.6 : 1), day.p48 * (sp.sec === "mid" ? 1.3 : sp.sec === "lower" ? 1.6 : 1));
    if (cl.t === "Clear") score += 2; else if (cl.t === "Clearing") score += 1; else if (cl.t === "Stained") score -= 1; else if (cl.t === "Blown" || cl.t === "Muddy") score -= 3;
    if (stocked.includes(sp.sec)) score += 2;
    if (isDH && sp.sec === "lower") score += 1.5;
    if (isW && sp.name === "Jones Br.") score -= 2;
    if (isW && sp.name === "Settles Br.") score += 1;
    if (ck === "overcast" && sp.name === "Hwy 20") score += 1.5;
    if (ck === "stained" && sp.sec === "upper") score += 1;
    if (ck === "cold" && sp.name === "Bowmans Is.") score += 1;

    // Dam schedule impact (today only, and only above Morgan Falls)
    let schedNote = null;
    if (isToday && sp.pulse >= 0) {
      // Active generation: calculate if pulse has reached this spot
      if (activeGen.length > 0) {
        const gen = activeGen[0];
        const minsSinceStart = (now - gen.start) / 60000;
        if (minsSinceStart >= sp.pulse) {
          // Pulse has arrived — water is high
          score -= 4;
          schedNote = "Water high from generation";
        } else {
          // Pulse hasn't arrived yet — there's a window
          const minsLeft = Math.round(sp.pulse - minsSinceStart);
          if (minsLeft > 60) { score += 2; schedNote = `${minsLeft} min window before pulse`; }
          else if (minsLeft > 30) { schedNote = `${minsLeft} min before pulse — fish fast`; }
          else { score -= 2; schedNote = "Pulse arriving soon — exit"; }
        }
      }
      // Upcoming generation: calculate window
      else if (upcomingGen.length > 0) {
        const gen = upcomingGen[0];
        const minsUntilGen = (gen.start - now) / 60000;
        const minsUntilPulse = minsUntilGen + sp.pulse;
        if (minsUntilPulse > 180) { score += 1; schedNote = `${Math.round(minsUntilPulse / 60)}hr fishing window`; }
        else if (minsUntilPulse > 90) { schedNote = `~${Math.round(minsUntilPulse / 60)}hr window — gen at ${ft(gen.start.toISOString())}`; }
        else if (minsUntilPulse > 45) { score -= 1; schedNote = `Short window — pulse by ${ft(new Date(now.getTime() + minsUntilPulse * 60000).toISOString())}`; }
        else { score -= 3; schedNote = "Not enough time before pulse"; }
      }
      // Recent generation ended: falling limb = prime time
      else if (recentGen.length > 0) {
        const gen = recentGen[0];
        const minsSinceEnd = (now - gen.end) / 60000;
        const fallingLimbArrival = sp.pulse + minsSinceEnd;
        if (minsSinceEnd + sp.pulse > 30 && minsSinceEnd + sp.pulse < 240) {
          score += 3;
          schedNote = "Falling limb — prime time";
        }
      }
    } else if (isToday && sp.pulse === -1 && activeGen.length > 0) {
      schedNote = "Below Morgan Falls — not directly affected";
    }

    const reasons = [];
    if (st.s >= 7) reasons.push(st.t + " flow");
    else if (st.s >= 4) reasons.push(st.t);
    if (cl.t === "Clear") reasons.push("Clear water");
    else if (cl.t !== "Blown" && cl.t !== "Muddy" && cl.t !== "Stained") reasons.push(cl.t);
    const sd = stockInfo?.stockDates?.[sp.sec];
    if (stocked.includes(sp.sec)) reasons.push(sd ? `Stocked ${sd}` : "Stocked this week");
    if (ck === "overcast" && sp.name === "Hwy 20") reasons.push("Best hatch water");
    if (isDH && sp.sec === "lower") reasons.push("DH season");
    if (isW && sp.name === "Settles Br.") reasons.push("Quieter weekends");
    if (schedNote) reasons.push(schedNote);
    return { ...sp, cfs, st, cl, score: Math.max(0, score), reasons };
  }).sort((a, b) => b.score - a.score);
}

async function fetchG(id, p) { try { const r = await fetch(`https://waterservices.usgs.gov/nwis/iv/?format=json&sites=${id}&parameterCd=${p}&period=P1D&siteStatus=all`); const d = await r.json(); return d?.value?.timeSeries?.[0]?.values?.[0]?.value || null; } catch { return null; } }
async function fetchWx() { try { const r = await fetch("https://api.open-meteo.com/v1/forecast?latitude=33.93&longitude=-84.35&current=temperature_2m,apparent_temperature,precipitation,wind_speed_10m,weather_code,cloud_cover&hourly=precipitation,wind_speed_10m,cloud_cover,weather_code&daily=temperature_2m_max,temperature_2m_min,apparent_temperature_max,apparent_temperature_min,precipitation_sum,wind_speed_10m_max,weather_code&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=America%2FNew_York&forecast_days=7&past_days=2"); return await r.json(); } catch { return null; } }
async function fetchStock() {
  const url = "https://georgiawildlife.com/sites/default/files/wrd/pdf/trout/Weekly_Stocking_Report.pdf";
  const proxies = ["https://api.allorigins.win/raw?url="+encodeURIComponent(url),"https://corsproxy.io/?"+encodeURIComponent(url),"https://api.codetabs.com/v1/proxy?quest="+encodeURIComponent(url)];
  for (const px of proxies) { try {
    const r = await fetch(px); if (!r.ok) continue;
    const b = new Uint8Array(await r.arrayBuffer()); let t = ""; for (let i = 0; i < b.length; i++) t += (b[i] >= 32 && b[i] < 127) ? String.fromCharCode(b[i]) : " ";
    const lo = t.toLowerCase(); const s = []; const stockDates = {};
    // Parse individual date entries
    const datePattern = /(\d{1,2})\/(\d{1,2})\/(\d{4})/g; let m;
    const dates = []; while ((m = datePattern.exec(t)) !== null) dates.push({idx:m.index, str:m[0], date:new Date(+m[3],+m[1]-1,+m[2])});
    // Check which sections were stocked and capture the day
    const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    if (lo.includes("morgan falls") || lo.includes("cochran") || lo.includes("paces")) {
      s.push("lower");
      const d = dates.find(d => { const ctx = lo.substring(Math.max(0,d.idx-5), d.idx+80); return ctx.includes("morgan") || ctx.includes("cochran"); });
      if (d) stockDates.lower = dayNames[d.date.getDay()];
    }
    if (lo.includes("buford") || lo.includes("bowman") || lo.includes("settles")) {
      s.push("upper");
      const d = dates.find(d => { const ctx = lo.substring(Math.max(0,d.idx-5), d.idx+80); return ctx.includes("buford") || ctx.includes("bowman") || ctx.includes("settles"); });
      if (d) stockDates.upper = dayNames[d.date.getDay()];
    }
    if (lo.includes("jones") || lo.includes("island ford") || lo.includes("mcginnis") || lo.includes("medlock")) {
      s.push("mid");
      const d = dates.find(d => { const ctx = lo.substring(Math.max(0,d.idx-5), d.idx+80); return ctx.includes("jones") || ctx.includes("island") || ctx.includes("mcginnis"); });
      if (d) stockDates.mid = dayNames[d.date.getDay()];
    }
    const dm = t.match(/(\d{1,2}\/\d{1,2}\/\d{4})\s*-\s*(\d{1,2}\/\d{1,2}\/\d{4})/);
    return { secs:[...new Set(s)], stockDates, dr:dm?`${dm[1]} - ${dm[2]}`:null, ok:true };
  } catch { continue; } }
  return { secs:[], stockDates:{}, dr:null, ok:false };
}

const wxI = c => { if (c === 0) return "\u2600\uFE0F"; if (c <= 3) return "\u26C5"; if (c <= 48) return "\uD83C\uDF2B\uFE0F"; if (c <= 67) return "\uD83C\uDF27\uFE0F"; if (c <= 77) return "\u2744\uFE0F"; if (c <= 82) return "\uD83C\uDF26\uFE0F"; if (c >= 95) return "\u26C8\uFE0F"; return "\uD83C\uDF24\uFE0F"; };
const wxT = c => { if (c === 0) return "Clear"; if (c <= 3) return "Partly cloudy"; if (c <= 48) return "Fog"; if (c <= 67) return "Rain"; if (c <= 77) return "Snow/sleet"; if (c >= 95) return "Thunderstorms"; return "Fair"; };
const ft = d => { try { return new Date(d).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}); } catch { return "-"; } };
const fp = m => { if (m === -1) return "N/A"; if (m === 0) return "At dam"; if (m < 60) return `${m}m`; const h = Math.floor(m/60), r = m%60; return r ? `${h}h${r}m` : `${h}h`; };
function trend(v) { if (!v || v.length < 4) return { a:"-", t:"Stable" }; const r = v.slice(-8).map(x => parseFloat(x.value)), d = r[r.length-1] - r[0]; if (d/r.length > 15) return { a:"\u2191\u2191", t:"Rising fast" }; if (d/r.length > 3) return { a:"\u2191", t:"Rising" }; if (d/r.length < -15) return { a:"\u2193\u2193", t:"Falling fast" }; if (d/r.length < -3) return { a:"\u2193", t:"Falling" }; return { a:"-", t:"Stable" }; }

function buildForecast(w) {
  if (!w?.daily) return []; const td = new Date(); td.setHours(0,0,0,0);
  return w.daily.time.map((ds, i) => {
    const dt = new Date(ds+"T12:00:00"), p24 = i > 0 ? w.daily.precipitation_sum[i-1] : 0, p48 = (i > 1 ? w.daily.precipitation_sum[i-2] : 0) + p24;
    let cloud = 50; if (w.hourly) { const dh = w.hourly.time.map((t,hi) => ({t:new Date(t),c:w.hourly.cloud_cover[hi]})).filter(h => h.t.toDateString() === dt.toDateString() && h.t.getHours() >= 7 && h.t.getHours() <= 17); if (dh.length) cloud = dh.reduce((s,h) => s+h.c,0)/dh.length; }
    const fm = w.daily.apparent_temperature_max ? w.daily.apparent_temperature_max[i] : w.daily.temperature_2m_max[i];
    const d = { tempMax:w.daily.temperature_2m_max[i], tempMin:w.daily.temperature_2m_min[i], feelsMax:fm, precip:w.daily.precipitation_sum[i], p24, p48, wind:w.daily.wind_speed_10m_max[i], cloud, wx:w.daily.weather_code[i] };
    return { ...d, score:scoreDay(d), date:dt, dateStr:ds, dayName:dt.toLocaleDateString("en-US",{weekday:"short"}), dateLabel:dt.toLocaleDateString("en-US",{month:"short",day:"numeric"}), isToday:dt.toDateString()===td.toDateString(), isPast:dt<td };
  }).filter(d => !d.isPast);
}

// LOGO
// ═══════════════════════════════════════════════════════════
function Logo() { return <svg viewBox="0 0 180 40" width={140} style={{display:"block"}}><rect x="1" y="1" width="178" height="38" rx="4" fill="none" stroke={T.gold} strokeWidth="1"/><path d="M 8,28 Q 25,24 40,28 Q 55,32 70,27 Q 85,22 100,28" fill="none" stroke={T.river} strokeWidth="1.2" opacity="0.5"/><text x="90" y="18" textAnchor="middle" fontFamily="'Playfair Display',Georgia,serif" fontSize="14" fontWeight="700" fill={T.cream} letterSpacing="3">HOOCH</text><text x="90" y="30" textAnchor="middle" fontFamily="'Playfair Display',Georgia,serif" fontSize="8" fontWeight="400" fill={T.gold} letterSpacing="4">REPORT</text></svg>; }

// ═══════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════
function App() {
  const [gd,setGd]=useState({}); const [wx,setWx]=useState(null); const [loading,setLoading]=useState(true); const [refresh,setRefresh]=useState(null);
  const [sel,setSel]=useState(null); const [sched,setSched]=useState([]); const [stocked,setStocked]=useState([]); const [stockInfo,setStockInfo]=useState(null);
  const [menu,setMenu]=useState(false); const [menuPage,setMenuPage]=useState(null); const [expSpot,setExpSpot]=useState(null);
  const [schOpen,setSchOpen]=useState(false); const [sH,setSH]=useState("7"),[sM,setSM]=useState("00"),[eH,setEH]=useState("9"),[eM,setEM]=useState("00");

  const load = useCallback(async () => { setLoading(true); try { const g = {}; const ps = Object.entries(GAUGES).map(async ([k,v]) => { const [d,t] = await Promise.all([fetchG(v.id,"00060"),fetchG(v.id,"00010")]); g[k] = {discharge:d,temp:t}; }); await Promise.all([...ps, fetchWx().then(w => setWx(w)), fetchStock().then(sr => { setStockInfo(sr); if (sr.ok && sr.secs.length) setStocked(sr.secs); })]); setGd(g); setRefresh(new Date()); } catch(e) { console.error(e); } finally { setLoading(false); } }, []);
  useEffect(() => { load(); const iv = setInterval(load, 5*60*1000); return () => clearInterval(iv); }, [load]);
  useEffect(() => { if (wx && !sel) { const f = buildForecast(wx); if (f.length) setSel(f.find(d => d.isToday) || f[0]); } }, [wx, sel]);

  const forecast = wx ? buildForecast(wx) : [];
  const best = forecast.filter(d => !d.isToday).reduce((b,d) => !b || d.score > b.score ? d : b, null);
  const damD = gd?.bufordDam?.discharge; const damCFS = damD?.length ? parseFloat(damD[damD.length-1].value) : null; const damTr = trend(damD); const isGen = damCFS !== null && damCFS > 900;
  const ranked = sel ? rankSpots(gd, sel, stocked, stockInfo, sched) : [];
  const month = new Date().getMonth()+1;
  const addSch = () => { const t = new Date(), s = new Date(t.getFullYear(),t.getMonth(),t.getDate(),+sH,+sM), e = new Date(t.getFullYear(),t.getMonth(),t.getDate(),+eH,+eM); if (e > s) { setSched(p => [...p,{start:s,end:e,id:Date.now()}]); setSchOpen(false); } };

  let verdict = "", vsub = "";
  if (sel) { if (sel.score >= 7) { verdict = "Great fishing day"; vsub = "Conditions are in your favor."; } else if (sel.score >= 5) { verdict = "Decent \u2014 worth going"; vsub = "Pick your spot carefully."; } else if (sel.score >= 3) { verdict = "Marginal"; vsub = "Tough conditions. Only if you need the fix."; } else { verdict = "Stay home"; vsub = "Tie flies instead."; } }

  return <div style={{minHeight:"100vh",background:`linear-gradient(170deg, ${T.card} 0%, ${T.bg} 30%, ${T.deep} 100%)`,color:T.cream,fontFamily:"'DM Sans',-apple-system,sans-serif"}}>
    <style>{`@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');
      @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}select,input{outline:none;font-family:'DM Sans',sans-serif}::-webkit-scrollbar{width:0;height:0}`}</style>

    <div style={{maxWidth:480,margin:"0 auto",padding:"0 20px 40px"}}>
      {/* HEADER */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"20px 0 16px"}}>
        <Logo/>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {refresh && <span style={{fontSize:9,color:T.muted}}>{ft(refresh.toISOString())}</span>}
          <button onClick={load} disabled={loading} style={{background:"none",border:"none",color:T.sage,fontSize:14,cursor:"pointer",opacity:loading?0.3:1}}>{"\u21BB"}</button>
          <button onClick={() => setMenu(true)} style={{background:"none",border:"none",color:T.cream,fontSize:20,cursor:"pointer"}}>{"\u2630"}</button>
        </div>
      </div>

      {/* DAM STATUS */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",borderRadius:10,background:isGen?"#2a1a0f":T.card,border:`1px solid ${isGen?T.sienna+"44":T.border}`,marginBottom:20}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:16}}>{isGen?"\u26A1":"\uD83C\uDF0A"}</span>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:isGen?T.sienna:T.ok}}>{isGen?"Dam Generating":"Base Flow"}</div>
            <div style={{fontSize:10,color:T.muted}}>{damCFS !== null ? `${Math.round(damCFS)} CFS \u00B7 ${damTr.t}` : "Loading..."}</div>
          </div>
        </div>
        <div style={{fontSize:24,fontWeight:800,color:isGen?T.sienna:T.ok,fontFamily:"'JetBrains Mono',monospace"}}>{damCFS !== null ? Math.round(damCFS) : "\u2014"}</div>
      </div>

      {/* WEEK BAR */}
      <div style={{display:"flex",gap:6,marginBottom:24,overflowX:"auto",paddingBottom:4}}>
        {forecast.slice(0,7).map(day => {
          const active = sel?.dateStr === day.dateStr; const isBest = best?.dateStr === day.dateStr; const sc = scoreColor(day.score);
          return <div key={day.dateStr} onClick={() => {setSel(day);setExpSpot(null);}} style={{flex:"0 0 auto",width:68,padding:"10px 6px",textAlign:"center",cursor:"pointer",borderRadius:10,position:"relative",transition:"all 0.15s",background:active?T.card:"transparent",border:active?`1.5px solid ${T.gold}55`:"1.5px solid transparent"}}>
            {isBest && <div style={{position:"absolute",top:2,right:6,fontSize:7,color:T.ok,fontWeight:700}}>{"\u2605"}</div>}
            <div style={{fontSize:10,fontWeight:600,color:active?T.cream:T.muted}}>{day.isToday?"Today":day.dayName}</div>
            <div style={{fontSize:22,margin:"2px 0"}}>{wxI(day.wx)}</div>
            <div style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:T.cream}}>{Math.round(day.feelsMax)}{"\u00B0"}</div>
            <div style={{height:3,borderRadius:2,background:T.border,marginTop:4,overflow:"hidden"}}><div style={{height:"100%",width:`${day.score*10}%`,background:sc,borderRadius:2}}/></div>
          </div>;
        })}
      </div>

      {/* DAY DETAIL */}
      {sel && <div style={{animation:"fadeIn 0.3s ease"}}>
        {/* Hero */}
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:56,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:scoreColor(sel.score),lineHeight:1}}>{sel.score.toFixed(1)}</div>
          <div style={{fontSize:20,fontWeight:700,fontFamily:"'Playfair Display',serif",marginTop:6}}>{verdict}</div>
          <div style={{fontSize:13,color:T.creamDim,marginTop:2}}>{sel.isToday?"Today":`${sel.dayName} ${sel.dateLabel}`} {"\u00B7"} {wxT(sel.wx)} {"\u00B7"} Feels {Math.round(sel.feelsMax)}{"\u00B0"}</div>
          <div style={{fontSize:11,color:T.muted,marginTop:2}}>{vsub}</div>
        </div>

        {/* Conditions */}
        <div style={{display:"flex",justifyContent:"space-around",marginBottom:28,padding:"14px 0",borderTop:`1px solid ${T.border}`,borderBottom:`1px solid ${T.border}`}}>
          {[{l:"Feels",v:`${Math.round(sel.feelsMax)}\u00B0`,c:sel.feelsMax<35?T.danger:T.cream},{l:"Wind",v:`${Math.round(sel.wind)}mph`,c:sel.wind>15?T.danger:T.cream},{l:"Rain",v:sel.precip>0?`${sel.precip}"`:"Dry",c:sel.precip>0.5?T.danger:T.cream},{l:"Water",v:clarity(sel.p24,sel.p48).t,c:clarity(sel.p24,sel.p48).c}].map(({l,v,c}) =>
            <div key={l} style={{textAlign:"center"}}><div style={{fontSize:16,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:c}}>{v}</div><div style={{fontSize:9,color:T.muted,textTransform:"uppercase",letterSpacing:1,marginTop:2}}>{l}</div></div>
          )}
        </div>

        {/* WHERE TO FISH */}
        <div style={{marginBottom:28}}>
          <div style={{fontSize:14,fontWeight:700,fontFamily:"'Playfair Display',serif",color:T.gold,marginBottom:12,letterSpacing:0.5}}>Where to Fish</div>
          {ranked.slice(0,5).map((sp,i) => {
            const exp = expSpot === sp.name;
            return <div key={sp.name} onClick={() => setExpSpot(exp?null:sp.name)} style={{padding:"12px 16px",marginBottom:6,borderRadius:8,cursor:"pointer",background:i===0?T.card:"transparent",borderLeft:`3px solid ${sp.st.c}`,border:exp?`1px solid ${T.border}`:"1px solid transparent",transition:"all 0.12s"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:14,fontWeight:700,color:T.muted,fontFamily:"'JetBrains Mono',monospace",width:18}}>{i+1}</span>
                  <div>
                    <div style={{fontSize:14,fontWeight:600,color:T.cream}}>{sp.name}</div>
                    <div style={{fontSize:10,color:T.muted}}>{sp.reasons.slice(0,3).join(" \u00B7 ")}</div>
                  </div>
                </div>
                <div style={{textAlign:"right"}}><div style={{fontSize:16,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:sp.st.c}}>{sp.cfs !== null ? Math.round(sp.cfs) : "\u2014"}</div><div style={{fontSize:9,color:sp.st.c}}>{sp.st.t}</div></div>
              </div>
              {exp && <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${T.border}`,fontSize:12,color:T.creamDim,lineHeight:1.6}}>
                <div style={{marginBottom:4}}>{sp.note}</div>
                <div style={{color:T.muted,fontSize:11}}>RM {sp.rm} {"\u00B7"} {sp.pulse >= 0 ? `Pulse ${fp(sp.pulse)}` : "Below Morgan Falls"} {"\u00B7"} {sp.reg}</div>
              </div>}
            </div>;
          })}
        </div>

        {/* WHAT TO TIE ON */}
        <div style={{marginBottom:28}}>
          <div style={{fontSize:14,fontWeight:700,fontFamily:"'Playfair Display',serif",color:T.gold,marginBottom:4,letterSpacing:0.5}}>What to Tie On</div>
          <div style={{fontSize:11,color:T.muted,marginBottom:12}}>{condKey(sel)==="stained"?"Stained water \u2014 bigger, darker":condKey(sel)==="cold"?"Cold front \u2014 slow, deep, midday":condKey(sel)==="overcast"?"Overcast \u2014 prime hatch conditions":"Bright sun \u2014 smaller, deeper"}</div>
          {HATCHES.filter(h => h.mo.includes(month)).slice(0,4).map(h => {
            const ck = condKey(sel); const flies = h.flies[ck] || []; const tip = h.tips[ck] || "";
            if (!flies.length) return null;
            return <div key={h.name} style={{marginBottom:10,paddingLeft:12,borderLeft:`2px solid ${h.c}`}}>
              <div style={{fontSize:13,fontWeight:600,color:h.c,fontFamily:"'Playfair Display',serif"}}>{h.name} <span style={{fontWeight:400,color:T.muted,fontSize:11}}>({h.sz})</span></div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap",margin:"4px 0"}}>{flies.map(f => <a key={f} href={`https://www.google.com/search?tbm=isch&q=${encodeURIComponent("fly fishing " + f.replace(/#\d+[-]?\d*/g,"").trim())}`} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:T.river,background:T.deep,border:`1px solid ${T.border}`,borderRadius:4,padding:"3px 8px",textDecoration:"none",fontStyle:"italic"}}>{f} {"\u2197"}</a>)}</div>
              <div style={{fontSize:11,color:T.creamDim,fontStyle:"italic"}}>{tip}</div>
            </div>;
          })}
        </div>

        {/* DAM SCHEDULE */}
        <div style={{marginBottom:28,padding:"12px 16px",borderRadius:8,background:T.card}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:12,fontWeight:600}}>Dam Schedule</div>
              <div style={{fontSize:9,color:T.muted}}><a href="https://spatialdata.usace.army.mil/hydropower/" target="_blank" rel="noopener noreferrer" style={{color:T.river,textDecoration:"underline"}}>USACE Schedule {"\u2197"}</a> {"\u00B7"} <span style={{fontFamily:"'JetBrains Mono',monospace"}}>770-945-1466</span></div>
            </div>
            <button onClick={() => setSchOpen(!schOpen)} style={{background:T.deep,border:`1px solid ${T.border}`,borderRadius:5,color:T.sage,fontSize:9,padding:"4px 10px",cursor:"pointer",fontWeight:600}}>{schOpen?"Cancel":"+ Add"}</button>
          </div>
          {sched.length > 0 && <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:8}}>{sched.sort((a,b) => a.start-b.start).map(s => { const now = new Date(), a = now >= s.start && now <= s.end; return <div key={s.id} style={{display:"flex",alignItems:"center",gap:4,background:a?T.sienna+"22":T.deep,border:`1px solid ${a?T.sienna+"44":T.border}`,borderRadius:4,padding:"2px 6px",fontSize:10,color:a?T.sienna:T.cream}}><span style={{fontFamily:"'JetBrains Mono',monospace"}}>{ft(s.start.toISOString())}-{ft(s.end.toISOString())}</span><button onClick={() => setSched(p => p.filter(x => x.id !== s.id))} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:11,padding:0}}>{"\u00D7"}</button></div>; })}</div>}
          {schOpen && <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",marginTop:8}}>
            {[["From",sH,setSH,sM,setSM],["To",eH,setEH,eM,setEM]].map(([l,h,setH,m,setM]) => <div key={l} style={{display:"flex",alignItems:"center",gap:3}}><span style={{fontSize:9,color:T.muted,fontWeight:700}}>{l}</span>
              <select value={h} onChange={e => setH(e.target.value)} style={{background:T.deep,border:`1px solid ${T.border}`,borderRadius:3,color:T.cream,fontSize:11,padding:"3px 4px",fontFamily:"'JetBrains Mono',monospace"}}>{Array.from({length:24},(_,i) => <option key={i} value={i}>{i===0?"12a":i<12?`${i}a`:i===12?"12p":`${i-12}p`}</option>)}</select>
              <select value={m} onChange={e => setM(e.target.value)} style={{background:T.deep,border:`1px solid ${T.border}`,borderRadius:3,color:T.cream,fontSize:11,padding:"3px 4px",fontFamily:"'JetBrains Mono',monospace"}}>{["00","15","30","45"].map(v => <option key={v} value={v}>:{v}</option>)}</select>
            </div>)}
            <button onClick={addSch} style={{background:T.ok+"22",border:`1px solid ${T.ok}44`,borderRadius:4,color:T.ok,fontSize:9,padding:"4px 8px",cursor:"pointer",fontWeight:700}}>Add</button>
          </div>}
          <div style={{fontSize:8,color:T.muted,marginTop:6}}>Select "Buford Dam / Lake Sidney Lanier" from the USACE dropdown.</div>
        </div>

        {/* STOCKING */}
        {stockInfo && <div style={{marginBottom:20,fontSize:11,color:T.creamDim}}>
          <span style={{fontWeight:600,color:T.gold,fontFamily:"'Playfair Display',serif",fontSize:12}}>Stocking </span>
          {stockInfo.ok ? (stocked.length > 0 ? <span>Hooch stocked this week ({stockInfo.dr}): <span style={{color:T.ok}}>{stocked.join(", ")}</span></span> : <span style={{color:T.muted}}>No Hooch stockings this week.</span>)
            : <span style={{color:T.muted}}>Auto-fetch unavailable. <a href="https://georgiawildlife.com/sites/default/files/wrd/pdf/trout/Weekly_Stocking_Report.pdf" target="_blank" rel="noopener noreferrer" style={{color:T.river}}>Check PDF {"\u2197"}</a></span>}
        </div>}
      </div>}

      {/* FOOTER */}
      <div style={{textAlign:"center",fontSize:8,color:T.muted,paddingTop:20,borderTop:`1px solid ${T.border}`,lineHeight:1.8}}>USGS {"\u00B7"} Open-Meteo {"\u00B7"} GA DNR {"\u00B7"} GA River Guidebook<br/>770-945-1466 {"\u00B7"} 855-DAM-FLOW {"\u00B7"} 1610 AM<br/>GA license + trout stamp {"\u00B7"} PFD {"\u00B7"} Fish safe</div>
    </div>

    {/* MENU */}
    {menu && <div style={{position:"fixed",inset:0,zIndex:100}}>
      <div onClick={() => {setMenu(false);setMenuPage(null);}} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.6)"}}/>
      <div style={{position:"absolute",right:0,top:0,bottom:0,width:300,background:T.bg,borderLeft:`1px solid ${T.border}`,animation:"slideIn 0.2s ease",overflowY:"auto",padding:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
          <div style={{fontSize:16,fontWeight:700,fontFamily:"'Playfair Display',serif"}}>{menuPage ? (menuPage === "gauges" ? "Live Gauges" : menuPage === "knots" ? "Knots" : "Menu") : "Menu"}</div>
          <button onClick={() => {if (menuPage) setMenuPage(null); else {setMenu(false);setMenuPage(null);}}} style={{background:"none",border:"none",color:T.cream,fontSize:menuPage?12:20,cursor:"pointer"}}>{menuPage ? "\u2190 Back" : "\u00D7"}</button>
        </div>

        {!menuPage && <div>{[{id:"gauges",icon:"📊",label:"Live Gauges"},{id:"knots",icon:"🪢",label:"Knots"},{id:"share",icon:"📤",label:"Share Report"}].map(item =>
          <div key={item.id} onClick={() => {
            if (item.id === "share") { const c = damD?.length ? Math.round(parseFloat(damD[damD.length-1].value)) : "?"; let txt = `🪰 HOOCH REPORT\n\nDam: ${c} CFS`; if (sel) txt += `\n${sel.isToday?"Today":sel.dayName}: ${sel.score.toFixed(1)}/10 - ${wxT(sel.wx)}, feels ${Math.round(sel.feelsMax)}°`; if (ranked.length) txt += `\nBest: ${ranked[0].name} (${ranked[0].st.t})`; if (best) txt += `\n★ ${best.dayName}: ${best.score.toFixed(1)}/10`; txt += `\n\n770-945-1466`; navigator.clipboard.writeText(txt).catch(() => {}); setMenu(false); return; }
            setMenuPage(item.id);
          }} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 0",borderBottom:`1px solid ${T.border}`,cursor:"pointer"}}>
            <span style={{fontSize:18}}>{item.icon}</span><span style={{fontSize:14,fontWeight:500}}>{item.label}</span>
          </div>
        )}</div>}

        {menuPage === "gauges" && <div>{SPOTS.map(sp => { const d = gd[sp.g]?.discharge; const cfs = d?.length ? parseFloat(d[d.length-1].value) : null; const st = cfsStatus(cfs,sp.wade);
          return <div key={sp.name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${T.border}`}}>
            <div><div style={{fontSize:12,color:T.cream}}>{sp.name}</div><div style={{fontSize:9,color:T.muted}}>RM {sp.rm}</div></div>
            <div style={{textAlign:"right"}}><span style={{fontSize:14,fontWeight:700,color:st.c,fontFamily:"'JetBrains Mono',monospace"}}>{cfs !== null ? Math.round(cfs) : "-"}</span> <span style={{fontSize:9,color:st.c}}>{st.t}</span></div>
          </div>;
        })}</div>}

        {menuPage === "knots" && <div>{KNOTS.map(cat => <div key={cat.cat} style={{marginBottom:16}}>
          <div style={{fontSize:10,fontWeight:700,color:T.gold,textTransform:"uppercase",letterSpacing:2,marginBottom:6,borderBottom:`1px solid ${T.border}`,paddingBottom:4}}>{cat.cat}</div>
          {cat.items.map(k => <div key={k.name} style={{marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:600,fontFamily:"'Playfair Display',serif"}}>{k.name}</div>
            <div style={{fontSize:10,color:T.muted,marginBottom:2}}>{k.use}</div>
            <div style={{fontSize:11,color:T.creamDim,lineHeight:1.6}}>{k.steps}</div>
            <a href="https://www.flyfisherman.com/editorial/fly-fisherman-s-complete-knot-guide/151819" target="_blank" rel="noopener noreferrer" style={{fontSize:9,color:T.river}}>Visual guide {"\u2197"}</a>
          </div>)}
        </div>)}</div>}
      </div>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script></body></html>
